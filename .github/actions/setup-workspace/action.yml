name: 'Setup Workspace'
description: 'Set up the Node.js environment, pnpm, and install dependencies with cache'

inputs:
  frozen-lockfile:
    description: 'Use --frozen-lockfile for installation'
    required: false
    default: 'true'

outputs:
  cache-key:
    description: 'Workspace cache key'
    value: repo-${{ github.sha }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'pnpm'

    - name: Install dependencies
      shell: bash
      run: |
        if [ "${{ inputs.frozen-lockfile }}" = "true" ]; then
          pnpm install --frozen-lockfile
        else
          pnpm install
        fi

    - name: Cache full workspace
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}
        key: repo-${{ github.sha }}


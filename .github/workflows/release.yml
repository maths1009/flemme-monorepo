name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-workspace
      - name: Run build
        run: pnpm turbo run build

  versionning:
    name: ✨ Versionning
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-workspace
      - name: Run versionning
        run: echo "Versionning"

  tags:
    name: 🎨 Tags
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-workspace
      - name: Run tags
        run: echo "Tags"